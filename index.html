<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    />
    <meta name="author" content="HackathonFeed" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.hackathonfeed.com/" />
    <meta name="theme-color" content="#ffcc00" />

    <meta property="og:image" content="https://www.hackathonfeed.com/og-image.svg" />

    <script>
      (function () {
        try {
          if (localStorage.getItem('hackathon_feed_theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {}
      })();
